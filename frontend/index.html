<!doctype html>
<html lang="en">
  <head>
    <script>
      /* Anti-flash: set the theme class + native color-scheme before paint.
         Storage key "agora-theme" mirrors STORAGE_KEY in src/store/themeStore.ts. */
      (function () {
        var theme = "dark";
        try {
          if (localStorage.getItem("agora-theme") === "light") theme = "light";
        } catch (e) {
          /* localStorage unavailable -> dark */
        }
        document.documentElement.classList.add(theme);
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Ágora — Civic Intelligence</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
